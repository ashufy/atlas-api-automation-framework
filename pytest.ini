[pytest]

# =========================
# Test Discovery
# =========================
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# =========================
# Default Execution/CLI Options
# =========================
addopts =
    -v
    -s
    --strict-markers
    --disable-warnings
    --tb=short
    --maxfail=3
    --reruns=1
    --reruns-delay=2

# =========================
# Test Markers
# =========================
markers =
    smoke: critical tests that must always pass
    sanity: quick functional checks
    regression: full validation suite
    api: API related tests
    slow: long-running tests
    integration: cross-service tests
    e2e: end-to-end scenarios
    flaky: unstable tests (to be monitored)

# =========================
# Logging (CI Friendly)
# =========================
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s | %(levelname)s | %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# =========================
# Warnings
# =========================
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning